<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - Tự Động</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#f8fafc] font-sans p-4 md:p-8 min-h-screen">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm p-5 flex flex-col sm:flex-row items-center justify-between border-t-4 border-[#FF8C00]">
            <div class="flex items-center gap-4 mb-4 sm:mb-0">
                <div class="p-3 bg-orange-100 text-[#FF8C00] rounded-xl shadow-inner">
                    <i data-lucide="trophy" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 uppercase tracking-wide">Bảng Xếp Hạng</h1>
                    <div class="text-sm font-medium text-slate-500 flex items-center gap-2">
                        Trực tiếp từ Google Sheet 
                        <div id="last-updated-container" class="hidden"></div>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="auto-refresh-btn" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold transition-all bg-emerald-100 text-emerald-700">
                    <i id="auto-refresh-icon" data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>
                    <span id="auto-refresh-text">Auto: BẬT</span>
                </button>
                <button id="refresh-btn" class="bg-[#FF8C00] hover:bg-[#E67E00] disabled:bg-slate-300 text-white p-2 rounded-lg shadow-md transition-all active:scale-95" title="Làm mới ngay lập tức">
                    <i id="refresh-icon" data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Bảng Xếp Hạng -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100 relative">
            
            <!-- Trạng thái Lỗi (Chỉ hiện khi chưa có data nào) -->
            <div id="error-state" class="hidden flex flex-col items-center justify-center h-80 text-slate-400 space-y-4 bg-slate-50">
                <i data-lucide="alert-triangle" class="w-16 h-16 text-red-400"></i>
                <p class="font-bold text-xl text-slate-600">Lỗi kết nối</p>
                <p id="error-message" class="text-sm text-red-500 max-w-md text-center"></p>
            </div>

            <!-- Trạng thái Đang Tải -->
            <div id="loading-state" class="flex flex-col items-center justify-center h-80 space-y-3">
                <i data-lucide="refresh-cw" class="w-10 h-10 text-[#FF8C00] animate-spin"></i>
                <p class="text-slate-500 font-medium">Đang đồng bộ dữ liệu...</p>
            </div>

            <!-- Trạng thái Trống -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-80 text-slate-400 space-y-3">
                <i data-lucide="alert-triangle" class="w-12 h-12 text-slate-300"></i>
                <p class="font-medium text-lg">Chưa có ai hoàn thành thử thách</p>
                <p class="text-sm">Hãy chờ học sinh đầu tiên nộp bài nhé!</p>
            </div>

            <!-- Bảng Dữ Liệu -->
            <div id="table-state" class="hidden flex-col">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-white text-sm uppercase tracking-wider">
                                <th class="py-4 px-4 font-bold w-20 text-center rounded-tl-xl">Hạng</th>
                                <th class="py-4 px-4 font-bold">Tên Nhóm / Tuyển Thủ</th>
                                <th class="py-4 px-4 font-bold text-center">Thời Gian</th>
                                <th class="py-4 px-4 font-bold text-center rounded-tr-xl">Điểm Số</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100 bg-white relative">
                            <!-- Nội dung bảng sẽ được chèn bằng JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Thông báo giải thích độ trễ của Google Sheet -->
                <div class="bg-blue-50/50 p-4 text-sm text-blue-700 flex justify-between items-center border-t border-blue-100">
                    <p class="flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-blue-500"></i>
                        <span><b>Lưu ý:</b> Dữ liệu tự động được lưu để chống lỗi máy chủ. Google có thể trễ vài phút.</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo icon ban đầu
        lucide.createIcons();

        // Cấu hình
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHO1TnlzHfMUWQsk0cm-Yc_cSV1o0CLZEqmzv59qWc-RSNbTcvVlgp7qfMfFLYw0gSEpVmfE41y7OQ/pub?output=tsv";
        
        // Trạng thái ứng dụng (Dùng LocalStorage làm bộ nhớ đệm thông minh)
        let teams = JSON.parse(localStorage.getItem('wall_leaderboard_cache') || '[]');
        let staleCount = 0; // Đếm số lần nhận được bản cache cũ
        let isLoading = false;
        let error = '';
        let lastUpdated = null;
        let isAutoRefresh = true;
        let intervalId = null;

        // Các phần tử DOM
        const els = {
            autoRefreshBtn: document.getElementById('auto-refresh-btn'),
            autoRefreshIcon: document.getElementById('auto-refresh-icon'),
            autoRefreshText: document.getElementById('auto-refresh-text'),
            refreshBtn: document.getElementById('refresh-btn'),
            refreshIcon: document.getElementById('refresh-icon'),
            lastUpdatedContainer: document.getElementById('last-updated-container'),
            
            errorState: document.getElementById('error-state'),
            errorMessage: document.getElementById('error-message'),
            loadingState: document.getElementById('loading-state'),
            emptyState: document.getElementById('empty-state'),
            tableState: document.getElementById('table-state'),
            tableBody: document.getElementById('table-body')
        };

        // Hàm parse file dữ liệu TSV
        function parseData(text) {
            const lines = text.split('\n');
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const row = lines[i].split('\t').map(item => item.replace(/^"|"$/g, '').trim());
                
                const name = row[0] || 'Ẩn danh';
                const score = parseInt(row[1], 10);
                let timeStr = row[2] || '00:00';
                
                let timeSec = 99999; 
                if (timeStr.includes(':')) {
                    const parts = timeStr.split(':');
                    timeSec = parseInt(parts[0] || 0, 10) * 60 + parseInt(parts[1] || 0, 10);
                } else if (!isNaN(timeStr) && timeStr !== '') {
                    timeSec = parseInt(timeStr, 10);
                    const m = Math.floor(timeSec / 60);
                    const s = timeSec % 60;
                    timeStr = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                }

                if (!isNaN(score)) {
                    result.push({
                        id: i.toString(),
                        name,
                        score,
                        time: timeStr,
                        timeSec
                    });
                }
            }
            return result;
        }

        // Cập nhật giao diện theo trạng thái
        function updateUI() {
            // Hiển thị nút refresh
            if (isLoading) {
                els.refreshIcon.classList.add('animate-spin');
                els.refreshBtn.disabled = true;
                els.autoRefreshIcon.classList.remove('animate-spin');
            } else {
                els.refreshIcon.classList.remove('animate-spin');
                els.refreshBtn.disabled = !GOOGLE_SHEET_URL;
                if (isAutoRefresh) els.autoRefreshIcon.classList.add('animate-spin');
            }

            // Nút Auto Refresh
            if (isAutoRefresh) {
                els.autoRefreshBtn.className = "flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold transition-all bg-emerald-100 text-emerald-700";
                els.autoRefreshText.textContent = "Auto: BẬT";
            } else {
                els.autoRefreshBtn.className = "flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold transition-all bg-slate-100 text-slate-600";
                els.autoRefreshText.textContent = "Auto: TẮT";
                els.autoRefreshIcon.classList.remove('animate-spin');
            }

            // Hiển thị trạng thái mạng nhỏ gọn
            if (error && teams.length > 0) {
                // Nếu bị lỗi nhưng đã có data, không sập bảng mà chỉ hiện cảnh báo đỏ
                els.lastUpdatedContainer.className = "text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full flex items-center gap-1";
                els.lastUpdatedContainer.innerHTML = `<i data-lucide="alert-triangle" class="w-3 h-3"></i><span>Dùng bộ nhớ tạm do mạng chập chờn</span>`;
                lucide.createIcons();
            } else if (lastUpdated) {
                els.lastUpdatedContainer.className = "text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full flex items-center gap-1";
                els.lastUpdatedContainer.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3"></i><span>Cập nhật: ${lastUpdated.toLocaleTimeString()}</span>`;
                lucide.createIcons();
            } else {
                els.lastUpdatedContainer.className = "hidden";
            }

            // Các trạng thái màn hình (Ẩn hết trước, hiện sau)
            els.errorState.classList.add('hidden');
            els.loadingState.classList.add('hidden');
            els.emptyState.classList.add('hidden');
            els.tableState.classList.add('hidden');
            els.tableState.classList.remove('flex'); 

            if (error && teams.length === 0) {
                els.errorState.classList.remove('hidden');
                els.errorState.classList.add('flex');
                els.errorMessage.textContent = error;
            } else if (isLoading && teams.length === 0) {
                els.loadingState.classList.remove('hidden');
                els.loadingState.classList.add('flex');
            } else if (teams.length === 0) {
                els.emptyState.classList.remove('hidden');
                els.emptyState.classList.add('flex');
            } else {
                els.tableState.classList.remove('hidden');
                els.tableState.classList.add('flex');
                renderTableBody();
            }
        }

        // Tạo nội dung bảng
        function renderTableBody() {
            // SẮP XẾP: Điểm cao trước -> Thời gian ngắn trước
            const sortedTeams = [...teams].sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return (a.timeSec || 99999) - (b.timeSec || 99999);
            });

            els.tableBody.innerHTML = sortedTeams.map((team, index) => {
                let rankIcon = '';
                if (index === 0) rankIcon = `<i data-lucide="trophy" class="text-yellow-500 w-7 h-7 drop-shadow-md"></i>`;
                else if (index === 1) rankIcon = `<i data-lucide="medal" class="text-gray-400 w-7 h-7 drop-shadow-md"></i>`;
                else if (index === 2) rankIcon = `<i data-lucide="medal" class="text-amber-700 w-7 h-7 drop-shadow-md"></i>`;
                else rankIcon = `<span class="text-slate-500 font-bold w-7 text-center text-lg">${index + 1}</span>`;

                let rowStyle = "bg-white border-l-4 border-transparent hover:bg-slate-50";
                if (index === 0) rowStyle = "bg-yellow-50 border-l-4 border-yellow-500 hover:bg-yellow-100 scale-[1.01] shadow-sm z-10 relative";
                else if (index === 1) rowStyle = "bg-slate-50 border-l-4 border-gray-400 hover:bg-slate-100";
                else if (index === 2) rowStyle = "bg-orange-50 border-l-4 border-amber-600 hover:bg-orange-100";

                const nameStyle = index < 3 ? 'text-slate-800' : 'text-slate-700';
                
                let scoreStyle = 'bg-sky-50 text-sky-700 border-sky-100';
                if (index === 0) scoreStyle = 'bg-[#FF8C00] text-white border-[#E67E00]';
                else if (index === 1) scoreStyle = 'bg-slate-200 text-slate-700 border-slate-300';
                else if (index === 2) scoreStyle = 'bg-orange-200 text-amber-800 border-orange-300';

                return `
                    <tr class="transition-all duration-300 ${rowStyle}">
                        <td class="py-4 px-4 text-center">
                            <div class="flex justify-center items-center">
                                ${rankIcon}
                            </div>
                        </td>
                        <td class="py-4 px-4">
                            <span class="font-black text-lg ${nameStyle}">${team.name}</span>
                        </td>
                        <td class="py-4 px-4 text-center">
                            <span class="inline-flex items-center justify-center gap-1.5 bg-slate-100 text-slate-600 font-bold px-3 py-1.5 rounded-lg text-sm min-w-[80px]">
                                <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
                                ${team.time}
                            </span>
                        </td>
                        <td class="py-4 px-4 text-center">
                            <span class="inline-block font-black px-4 py-1.5 rounded-xl text-xl shadow-sm border ${scoreStyle}">
                                ${team.score}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');

            lucide.createIcons();
        }

        // Tải dữ liệu
        async function fetchData() {
            if (!GOOGLE_SHEET_URL) return;

            isLoading = true;
            error = '';
            updateUI();

            try {
                // Thêm thời gian vào link để chống lưu cache của trình duyệt
                const fetchUrl = `${GOOGLE_SHEET_URL}${GOOGLE_SHEET_URL.includes('?') ? '&' : '?'}t=${new Date().getTime()}`;
                
                const res = await fetch(fetchUrl);
                if (!res.ok) throw new Error('Không thể kết nối đến Google.');
                
                const text = await res.text();
                if (text.toLowerCase().includes('<!doctype html>')) {
                    throw new Error('Định dạng không hợp lệ.');
                }

                const parsedData = parseData(text);

                // --- BỘ NHỚ THÔNG MINH CHỐNG LỖI GOOGLE CDN ---
                // Kiểm tra xem dữ liệu mới có bị "thiếu người" so với màn hình hiện tại không
                let isMissingData = false;
                if (teams.length > 0) {
                    const newKeys = new Set(parsedData.map(t => t.name + '|' + t.score + '|' + t.time));
                    for (const t of teams) {
                        if (!newKeys.has(t.name + '|' + t.score + '|' + t.time)) {
                            isMissingData = true;
                            break;
                        }
                    }
                }

                if (isMissingData) {
                    staleCount++;
                    // Chờ 3 chu kỳ (khoảng 1.5 phút) để xác nhận xem giáo viên có thật sự xóa điểm không
                    // Nếu chưa tới 3 lần, từ chối bản mới bị thiếu và dùng lại bản đầy đủ trên màn hình
                    if (staleCount < 4) {
                        console.log("Phát hiện Google phân phối bản cũ, sử dụng lại bộ nhớ máy...");
                        isLoading = false;
                        updateUI();
                        return;
                    }
                }

                // Nếu an toàn hoặc đã qua 3 lần chờ
                staleCount = 0;
                teams = parsedData;
                
                // Lưu ngầm xuống máy tính (khi load lại trang cũng không bị mất)
                localStorage.setItem('wall_leaderboard_cache', JSON.stringify(teams));
                lastUpdated = new Date();
                
            } catch (err) {
                error = err.message || 'Có lỗi mạng.';
            } finally {
                isLoading = false;
                updateUI();
            }
        }

        // Quản lý Timer làm mới
        function setupInterval() {
            if (intervalId) clearInterval(intervalId);
            if (isAutoRefresh && GOOGLE_SHEET_URL) {
                // Tự động làm mới 30 giây một lần
                intervalId = setInterval(fetchData, 30000); 
            }
        }

        // Gắn sự kiện
        els.refreshBtn.addEventListener('click', fetchData);
        
        els.autoRefreshBtn.addEventListener('click', () => {
            isAutoRefresh = !isAutoRefresh;
            updateUI();
            setupInterval();
        });

        // Khởi động
        fetchData();
        setupInterval();

    </script>
</body>
</html>
