<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - 3 Vòng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#f8fafc] font-sans p-2 sm:p-4 md:p-8 min-h-screen">
    <div class="max-w-5xl mx-auto space-y-4 sm:space-y-6">
        
        <header class="bg-white rounded-2xl shadow-sm p-4 sm:p-5 flex flex-col sm:flex-row items-center justify-between border-t-4 border-[#FF8C00]">
            <div class="flex items-center gap-3 sm:gap-4 mb-4 sm:mb-0 w-full sm:w-auto">
                <div class="p-3 bg-orange-100 text-[#FF8C00] rounded-xl shadow-inner shrink-0">
                    <i data-lucide="trophy" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-black text-slate-800 uppercase tracking-wide">Bảng Xếp Hạng</h1>
                    <div class="text-xs sm:text-sm font-medium text-slate-500 flex items-center gap-2 mt-1">
                        Dữ liệu Trực tiếp (Firebase)
                        <div id="last-updated-container" class="hidden"></div>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-3 w-full sm:w-auto justify-end">
                <button id="auto-refresh-btn" class="flex items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all bg-emerald-100 text-emerald-700">
                    <i id="auto-refresh-icon" data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>
                    <span id="auto-refresh-text">Auto: BẬT</span>
                </button>
                <button id="refresh-btn" class="bg-[#FF8C00] hover:bg-[#E67E00] disabled:bg-slate-300 text-white p-2 rounded-lg shadow-md transition-all active:scale-95" title="Làm mới ngay lập tức">
                    <i id="refresh-icon" data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-row">
            <button id="tab-0" class="flex-1 py-3 sm:py-4 px-1 text-center font-bold text-[11px] sm:text-sm border-b-4 border-orange-500 text-orange-600 bg-orange-50 transition-colors flex flex-col items-center justify-center gap-1" onclick="switchTab(0)">
                <i data-lucide="blocks" class="w-4 h-4 sm:w-5 sm:h-5 hidden sm:block"></i>
                <span>Vòng 1 (Firebase)</span>
            </button>
            <button id="tab-1" class="flex-1 py-3 sm:py-4 px-1 text-center font-bold text-[11px] sm:text-sm border-b-4 border-transparent text-slate-500 hover:bg-slate-50 transition-colors flex flex-col items-center justify-center gap-1" onclick="switchTab(1)">
                <i data-lucide="map" class="w-4 h-4 sm:w-5 sm:h-5 hidden sm:block"></i>
                <span>Vòng 2 (Firebase)</span>
            </button>
            <button id="tab-2" class="flex-1 py-3 sm:py-4 px-1 text-center font-bold text-[11px] sm:text-sm border-b-4 border-transparent text-slate-500 hover:bg-slate-50 transition-colors flex flex-col items-center justify-center gap-1" onclick="switchTab(2)">
                <i data-lucide="flag" class="w-4 h-4 sm:w-5 sm:h-5 hidden sm:block"></i>
                <span>Vòng 3 (Firebase)</span>
            </button>
            <button id="tab-3" class="flex-1 py-3 sm:py-4 px-1 text-center font-bold text-[11px] sm:text-sm border-b-4 border-transparent text-slate-500 hover:bg-slate-50 transition-colors flex flex-col items-center justify-center gap-1" onclick="switchTab(3)">
                <i data-lucide="calculator" class="w-4 h-4 sm:w-5 sm:h-5 hidden sm:block text-orange-500"></i>
                <span class="text-slate-800">Tổng Kết</span>
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100 relative">
            <div id="error-state" class="hidden flex flex-col items-center justify-center h-80 text-slate-400 space-y-4 bg-slate-50 p-6">
                <i data-lucide="alert-triangle" class="w-16 h-16 text-red-400"></i>
                <p class="font-bold text-xl text-slate-600 text-center">Lỗi cấu hình</p>
                <p id="error-message" class="text-sm text-red-500 max-w-md text-center"></p>
            </div>

            <div id="loading-state" class="flex flex-col items-center justify-center h-80 space-y-3">
                <i data-lucide="refresh-cw" class="w-10 h-10 text-[#FF8C00] animate-spin"></i>
                <p class="text-slate-500 font-medium">Đang tải dữ liệu...</p>
            </div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-80 text-slate-400 space-y-3 p-6 text-center">
                <i data-lucide="inbox" class="w-12 h-12 text-slate-300"></i>
                <p class="font-medium text-lg">Chưa có dữ liệu</p>
                <p class="text-sm">Chưa có đội nào nộp bài hoặc dữ liệu đang trống.</p>
                <p id="debug-text" class="text-xs font-mono text-red-600 bg-red-50 p-3 mt-4 rounded-lg border border-red-200 break-words hidden max-w-2xl text-left"></p>
            </div>

            <div id="table-state" class="hidden flex-col">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-slate-800 text-white text-xs sm:text-sm uppercase tracking-wider">
                                <th class="py-3 px-2 sm:py-4 sm:px-4 font-bold w-16 sm:w-20 text-center rounded-tl-xl">Hạng</th>
                                <th class="py-3 px-2 sm:py-4 sm:px-4 font-bold">Tên Nhóm / Tuyển Thủ</th>
                                <th class="py-3 px-2 sm:py-4 sm:px-4 font-bold text-center">Thời Gian</th>
                                <th class="py-3 px-2 sm:py-4 sm:px-4 font-bold text-center rounded-tr-xl">Điểm Số</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100 bg-white relative">
                        </tbody>
                    </table>
                </div>
                
                <div class="bg-blue-50/50 p-3 sm:p-4 text-xs sm:text-sm text-blue-700 flex justify-between items-center border-t border-blue-100">
                    <p class="flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-blue-500 shrink-0"></i>
                        <span id="footer-info">Dữ liệu được xử lý độc lập cho từng vòng.</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
        
        // --- VÒNG 1 (Xây Tường Thành) ---
        const configV1 = {
            apiKey: "AIzaSyCvhFO4AcZrnMeV_f5TtXMcuFQo2YTiUgg",
            databaseURL: "https://xaytuongthanh-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const appV1 = initializeApp(configV1, "appV1");
        const dbV1 = getDatabase(appV1);

        // --- VÒNG 2 (Vượt Mê Cung) ---
        const configV2 = {
            apiKey: "AIzaSyB1b8fzYweiF5v5eokhpfLJkA336NIELB8",
            databaseURL: "https://vuotmecung-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const appV2 = initializeApp(configV2, "appV2");
        const dbV2 = getDatabase(appV2);

        // --- VÒNG 3 (Giải Mã Bức Tranh) ---
        const configV3 = {
            apiKey: "AIzaSyCFCslfgIwHBv8p5SSyVjIS8cNqQUD8Eao",
            databaseURL: "https://giaimabuctranh-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const appV3 = initializeApp(configV3, "appV3");
        const dbV3 = getDatabase(appV3);
        
        // --- HÀM LẤY VÀ LỌC DỮ LIỆU CHUNG ---
        window.getFirebaseData = async function(roundIndex) {
            let db, path, dbName;
            if (roundIndex === 0) {
                db = dbV1; path = "leaderboard"; dbName = "VÒNG 1";
            } else if (roundIndex === 1) {
                db = dbV2; path = "vuot_me_cung_leaderboard"; dbName = "VÒNG 2";
            } else if (roundIndex === 2) {
                db = dbV3; path = "leaderboard"; dbName = "VÒNG 3";
            }

            const snapshot = await get(ref(db, path));
            const result = [];
            let sampleData = null; 

            if (snapshot.exists()) {
                let i = 1;
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (i === 1) sampleData = data; 
                    
                    if (typeof data !== 'object') return; 

                    let timeSec = data.timeSec !== undefined ? data.timeSec : (data.timeSeconds !== undefined ? data.timeSeconds : 99999);
                    let timeStr = data.time || '';
                    
                    if (!timeStr && timeSec !== 99999) {
                        const m = Math.floor(timeSec / 60);
                        const s = timeSec % 60;
                        timeStr = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                    } else if (typeof data.time === 'string' && data.time.includes(':')) {
                        const parts = data.time.split(':');
                        timeSec = parseInt(parts[0] || 0, 10) * 60 + parseInt(parts[1] || 0, 10);
                    } else if (data.time && !isNaN(data.time) && timeSec === 99999) {
                        timeSec = parseInt(data.time, 10);
                        const m = Math.floor(timeSec / 60);
                        const s = timeSec % 60;
                        timeStr = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                    }
                    if (!timeStr) timeStr = '00:00';
                    
                    const name = data.name || data.ten || data.playerName || data.teamName;
                    const score = data.score !== undefined ? data.score : (data.diem !== undefined ? data.diem : (data.points !== undefined ? data.points : 0));

                    if (name !== undefined) {
                        result.push({
                            id: i.toString(),
                            name: name || 'Ẩn danh', 
                            score: parseInt(score, 10), 
                            time: timeStr,
                            timeSec: timeSec
                        });
                    }
                    i++;
                });

                if (result.length === 0 && sampleData) {
                    return { result: [], debug: `[DEBUG ${dbName}] Dữ liệu bị sai tên biến. Cấu trúc mẫu: ` + JSON.stringify(sampleData) };
                }
                return { result: result, debug: "" };
            } else {
                return { result: [], debug: `[DEBUG ${dbName}] Thư mục đang trống.` };
            }
        };
    </script>

    <script>
        lucide.createIcons();

        let currentTab = 0;
        let teamsData = [ 
            JSON.parse(localStorage.getItem('wall_leaderboard_cache_0') || '[]'), 
            JSON.parse(localStorage.getItem('wall_leaderboard_cache_1') || '[]'), 
            JSON.parse(localStorage.getItem('wall_leaderboard_cache_2') || '[]'), 
            [] 
        ];
        let lastUpdatedData = [null, null, null, null];
        let errorsData = ['', '', '', ''];
        let debugMessages = ['', '', '', ''];
        
        let isLoading = false;
        let isAutoRefresh = true;
        let intervalId = null;

        // Hàm tính Tổng Kết
        function calculateTotalData() {
            const map = new Map();
            for (let i = 0; i < 3; i++) {
                const roundData = teamsData[i] || [];
                const bestInRound = new Map();
                
                // 1. Tìm điểm cao nhất của từng đội trong 1 vòng
                roundData.forEach(team => {
                    const key = team.name.trim().toLowerCase(); 
                    if (!bestInRound.has(key)) {
                        bestInRound.set(key, team);
                    } else {
                        const currentBest = bestInRound.get(key);
                        if (team.score > currentBest.score || (team.score === currentBest.score && team.timeSec < currentBest.timeSec)) {
                            bestInRound.set(key, team);
                        }
                    }
                });

                // 2. Cộng dồn vào Tổng
                bestInRound.forEach((bestTeam, key) => {
                    if (!map.has(key)) {
                        map.set(key, { id: bestTeam.id + '_total', name: bestTeam.name, score: 0, timeSec: 0 });
                    }
                    const aggregated = map.get(key);
                    aggregated.score += bestTeam.score;
                    aggregated.timeSec += bestTeam.timeSec;
                });
            }

            // 3. Quy đổi lại định dạng Thời Gian chuẩn để hiển thị
            const aggregatedArray = Array.from(map.values()).map(team => {
                const m = Math.floor(team.timeSec / 60);
                const s = team.timeSec % 60;
                team.time = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                return team;
            });

            teamsData[3] = aggregatedArray;
        }

        calculateTotalData(); 

        const els = {
            autoRefreshBtn: document.getElementById('auto-refresh-btn'),
            autoRefreshIcon: document.getElementById('auto-refresh-icon'),
            autoRefreshText: document.getElementById('auto-refresh-text'),
            refreshBtn: document.getElementById('refresh-btn'),
            refreshIcon: document.getElementById('refresh-icon'),
            lastUpdatedContainer: document.getElementById('last-updated-container'),
            footerInfo: document.getElementById('footer-info'),
            errorState: document.getElementById('error-state'),
            errorMessage: document.getElementById('error-message'),
            loadingState: document.getElementById('loading-state'),
            emptyState: document.getElementById('empty-state'),
            tableState: document.getElementById('table-state'),
            tableBody: document.getElementById('table-body')
        };

        function switchTab(index) {
            if (isLoading) return; 
            currentTab = index;
            
            for(let i = 0; i < 4; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (i === currentTab) {
                    tab.className = "flex-1 py-3 sm:py-4 px-1 text-center font-bold text-[11px] sm:text-sm border-b-4 border-orange-500 text-orange-600 bg-orange-50 transition-colors flex flex-col items-center justify-center gap-1";
                } else {
                    tab.className = "flex-1 py-3 sm:py-4 px-1 text-center font-bold text-[11px] sm:text-sm border-b-4 border-transparent text-slate-500 hover:bg-slate-50 transition-colors flex flex-col items-center justify-center gap-1";
                }
            }
            updateUI();
            fetchData();
        }

        function updateUI() {
            const currentTeams = teamsData[currentTab];
            const currentError = errorsData[currentTab];
            const currentLastUpdated = lastUpdatedData[currentTab];
            const currentDebug = debugMessages[currentTab];

            if (currentTab === 3) {
                els.footerInfo.innerHTML = "Hệ thống tự động lấy <b>điểm cao nhất</b> của mỗi đội ở từng vòng để cộng lại thành tổng.";
            } else {
                els.footerInfo.textContent = `Dữ liệu Vòng ${currentTab + 1} đang được đồng bộ theo thời gian thực từ Firebase.`;
            }

            if (isLoading) {
                els.refreshIcon.classList.add('animate-spin');
                els.refreshBtn.disabled = true;
                els.autoRefreshIcon.classList.remove('animate-spin');
            } else {
                els.refreshIcon.classList.remove('animate-spin');
                els.refreshBtn.disabled = false;
                if (isAutoRefresh) els.autoRefreshIcon.classList.add('animate-spin');
            }

            if (isAutoRefresh) {
                els.autoRefreshBtn.className = "flex items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all bg-emerald-100 text-emerald-700";
                els.autoRefreshText.textContent = "Auto: BẬT";
            } else {
                els.autoRefreshBtn.className = "flex items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all bg-slate-100 text-slate-600";
                els.autoRefreshText.textContent = "Auto: TẮT";
                els.autoRefreshIcon.classList.remove('animate-spin');
            }

            if (currentError && currentTeams.length > 0) {
                els.lastUpdatedContainer.className = "text-[10px] sm:text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full flex items-center gap-1";
                els.lastUpdatedContainer.innerHTML = `<i data-lucide="alert-triangle" class="w-3 h-3"></i><span>Bộ nhớ tạm</span>`;
            } else if (currentLastUpdated) {
                els.lastUpdatedContainer.className = "text-[10px] sm:text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full flex items-center gap-1";
                els.lastUpdatedContainer.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3"></i><span class="hidden sm:inline">Cập nhật: </span><span>${currentLastUpdated.toLocaleTimeString()}</span>`;
            } else {
                els.lastUpdatedContainer.className = "hidden";
            }
            lucide.createIcons();

            els.errorState.classList.add('hidden');
            els.loadingState.classList.add('hidden');
            els.emptyState.classList.add('hidden');
            els.tableState.classList.add('hidden');
            els.tableState.classList.remove('flex'); 

            if (currentError && currentTeams.length === 0) {
                els.errorState.classList.remove('hidden');
                els.errorState.classList.add('flex');
                els.errorMessage.textContent = currentError;
            } else if (isLoading && currentTeams.length === 0) {
                els.loadingState.classList.remove('hidden');
                els.loadingState.classList.add('flex');
            } else if (currentTeams.length === 0) {
                els.emptyState.classList.remove('hidden');
                els.emptyState.classList.add('flex');
                
                const debugEl = document.getElementById('debug-text');
                if (currentDebug) {
                    debugEl.textContent = currentDebug;
                    debugEl.classList.remove('hidden');
                } else {
                    debugEl.classList.add('hidden');
                }
            } else {
                els.tableState.classList.remove('hidden');
                els.tableState.classList.add('flex');
                renderTableBody(currentTeams);
            }
        }

        function renderTableBody(teamsList) {
            const sortedTeams = [...teamsList].sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return (a.timeSec || 99999) - (b.timeSec || 99999);
            });

            els.tableBody.innerHTML = sortedTeams.map((team, index) => {
                let rankIcon = '';
                if (index === 0) {
                    rankIcon = `<i data-lucide="trophy" class="text-yellow-500 w-6 h-6 sm:w-7 sm:h-7 drop-shadow-md"></i>`;
                } else if (index === 1) {
                    rankIcon = `<div class="relative flex justify-center w-6 h-6 sm:w-7 sm:h-7"><i data-lucide="award" class="text-slate-400 w-6 h-6 sm:w-7 sm:h-7 drop-shadow-md"></i><span class="absolute top-[3px] sm:top-[4px] text-[10px] sm:text-[11px] font-black text-slate-700">2</span></div>`;
                } else if (index === 2) {
                    rankIcon = `<div class="relative flex justify-center w-6 h-6 sm:w-7 sm:h-7"><i data-lucide="award" class="text-amber-600 w-6 h-6 sm:w-7 sm:h-7 drop-shadow-md"></i><span class="absolute top-[3px] sm:top-[4px] text-[10px] sm:text-[11px] font-black text-amber-900">3</span></div>`;
                } else {
                    rankIcon = `<span class="text-slate-500 font-bold w-6 sm:w-7 text-center text-sm sm:text-lg">${index + 1}</span>`;
                }

                let rowStyle = "bg-white border-l-4 border-transparent hover:bg-slate-50";
                if (index === 0) rowStyle = "bg-yellow-50 border-l-4 border-yellow-500 hover:bg-yellow-100 scale-[1.01] shadow-sm z-10 relative";
                else if (index === 1) rowStyle = "bg-slate-50 border-l-4 border-gray-400 hover:bg-slate-100";
                else if (index === 2) rowStyle = "bg-orange-50 border-l-4 border-amber-600 hover:bg-orange-100";

                return `
                    <tr class="transition-all duration-300 ${rowStyle}">
                        <td class="py-3 px-2 sm:py-4 sm:px-4 text-center"><div class="flex justify-center items-center">${rankIcon}</div></td>
                        <td class="py-3 px-2 sm:py-4 sm:px-4"><span class="font-black text-sm sm:text-lg ${index < 3 ? 'text-slate-800' : 'text-slate-700'}">${team.name}</span></td>
                        <td class="py-3 px-2 sm:py-4 sm:px-4 text-center">
                            <span class="inline-flex items-center justify-center gap-1 bg-slate-100 text-slate-600 font-bold px-2 py-1 rounded-lg text-xs sm:text-sm">
                                <i data-lucide="clock" class="w-3 h-3 sm:w-4 sm:h-4 text-slate-400"></i> ${team.time}
                            </span>
                        </td>
                        <td class="py-3 px-2 sm:py-4 sm:px-4 text-center">
                            <span class="inline-block font-black px-3 py-1 rounded-xl text-base sm:text-xl shadow-sm border ${index === 0 ? 'bg-[#FF8C00] text-white border-[#E67E00]' : index === 1 ? 'bg-slate-200 text-slate-700 border-slate-300' : index === 2 ? 'bg-orange-200 text-amber-800 border-orange-300' : 'bg-sky-50 text-sky-700 border-sky-100'}">
                                ${team.score}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');

            lucide.createIcons();
        }

        async function fetchData() {
            isLoading = true;
            errorsData[currentTab] = '';
            updateUI();

            try {
                if (currentTab === 3) {
                    await Promise.all([0, 1, 2].map(async (idx) => {
                        try {
                            if (window.getFirebaseData) {
                                const fbData = await window.getFirebaseData(idx);
                                if (fbData.result.length > 0) {
                                    teamsData[idx] = fbData.result;
                                    localStorage.setItem(`wall_leaderboard_cache_${idx}`, JSON.stringify(teamsData[idx]));
                                }
                            }
                        } catch (e) {
                            console.error(`Lỗi tải dữ liệu vòng ${idx + 1}:`, e);
                        }
                    }));
                    
                    calculateTotalData(); 
                    lastUpdatedData[3] = new Date();
                } else {
                    if (window.getFirebaseData) {
                        const fbData = await window.getFirebaseData(currentTab);
                        debugMessages[currentTab] = fbData.debug;
                        if (fbData.result.length > 0) {
                            teamsData[currentTab] = fbData.result;
                            localStorage.setItem(`wall_leaderboard_cache_${currentTab}`, JSON.stringify(teamsData[currentTab]));
                        }
                    }
                    lastUpdatedData[currentTab] = new Date();
                }
            } catch (err) {
                errorsData[currentTab] = err.message || 'Có lỗi khi kết nối dữ liệu.';
            } finally {
                isLoading = false;
                updateUI();
            }
        }

        function setupInterval() {
            if (intervalId) clearInterval(intervalId);
            if (isAutoRefresh) intervalId = setInterval(fetchData, 30000); 
        }

        els.refreshBtn.addEventListener('click', fetchData);
        els.autoRefreshBtn.addEventListener('click', () => {
            isAutoRefresh = !isAutoRefresh;
            updateUI();
            setupInterval();
        });

        setTimeout(() => fetchData(), 500);
        setupInterval();
    </script>
</body>
</html>
